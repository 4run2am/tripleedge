name: TripleEdge Signal

on:
  # Weekly auto-signal every Monday at 8:00 AM ET (13:00 UTC)
  schedule:
    - cron: '0 13 * * 1'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - bot

permissions:
  contents: write   # required to commit engine_state.json after signal run

jobs:
  weekly-signal:
    name: Send Weekly Signal
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest state
        run: git pull --rebase

      - name: Run weekly signal
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python signal.py

      - name: Commit updated engine state
        run: |
          git config user.name "TripleEdge Bot"
          git config user.email "bot@tripleedge"
          git add engine_state.json
          git diff --staged --quiet || git commit -m "Weekly signal state update [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
