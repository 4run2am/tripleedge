name: TripleEdge Bot

on:
  # Poll every 10 minutes to handle /status, /setportfolio, /help commands
  schedule:
    - cron: '*/10 * * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write   # required to commit and push users.json / bot_offset.json

jobs:
  bot-poll:
    name: Poll Bot Commands
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest state
        run: git pull --rebase

      - name: Run bot (50 second poll window)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: timeout 55 python bot_actions.py || true

      - name: Commit updated state files
        run: |
          git config user.name "TripleEdge Bot"
          git config user.email "bot@tripleedge"
          git add users.json bot_offset.json
          git diff --staged --quiet || git commit -m "Bot state update [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
